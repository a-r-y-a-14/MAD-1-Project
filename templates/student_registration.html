<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employex | Student Registration</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="top-border">
        <div>
            <h1>Employex</h1>
            <h4>The Ultimate Solution to Employment</h4>
        </div>
        <div class="btn-group">
            <a href="/" class="btn">Home</a>
        </div>
    </div>
    <div class="login">
        <div class="login-card" style="width: 455px;">
            <h2>Student Registration</h2>
            <p>Your first steps towards employment</p>

            <form method="POST">
                <label>First Name</label>
                <input type="text" name="fname" required>

                <label>Last Name</label>
                <input type="text" name="lname" required>
                
                <label>Date of Birth</label>
                <input type="date" name="dob" required>
                
                <label>Department</label>
                <input type="text" name="department" required>
                
                <label>Set a Username</label>
                <input type="text" name="username" required>

                <div class="row">
                    <div class="field">        
                        <label>Password</label>
                        <input type="password" name="password" required>
                    </div>
                    <div class="field">
                        <label>Confirm Password</label>
                        <input type="password" name="confpassword" required>
                    </div>
                </div>
                
                <button type="submit" class="login-btn">Register</button>
            </form>


            <div class="links">
                <span>Aldready here?</span> <a href="/student-login">Login</a>
            </div>
        </div>
    </div>
</body>
</html>
